<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Doação de sangue</title>
</head>

<body>
   <div class="container">
    <h1>Cadastro do doador</h1>
    <p>Preencha os dados para se candidatar</p>

    <form id="formDoador">
        <div class="form-grupo">
            <label for="nome">Nome completo:</label>
            <input type="text" id="nome" placeholder="Ex: Icaro Botelho" required>
        </div>
        <br>

        <div class="form-grupo">
            <label for="email">Email:</label>
            <input type="email" id="email" placeholder="icaro111@exemplo.com" required>
        </div>
        <br>

        <div class="row">
            <label for="idade">Idade:</label>
            <input type="idade" id="age" min="0" required>
        </div>
        <br>

        <div class="form-grupo">
            <label for="peso">Peso (kg):</label>
            <input type="number" id="peso" step="0.1" min="0" required>
        </div>
     </div>

     <div class="form-grupo">
        <label for="tipo sanguineo">Tipo Sanguineo</label>
        <select id="tipo sanguineo" required>
            <option value="">Selecione:</option>
            <option value="A+">A+</option>
            <option value="A-">A-</option>
            <option value="B+">B+</option>
            <option value="B-">B-</option>
            <option value="AB+">AB+</option>
            <option value="AB-">AB-</option>
            <option value="O+">O+</option>
            <option value="O-">O-</option>
        </select>
     </div>
     <br>

     <div class="form-grupo">
        <label for="telefone">Telefone:</label>
        <input type="number" id="telefone" maxlength="11" required>
     </div>

    
</body>
</html>
